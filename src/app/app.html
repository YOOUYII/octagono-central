<header class="fixed top-0 left-0 w-full bg-black text-white z-50 shadow-lg">
  <div class="flex items-center justify-between px-6 py-4">

    <!-- Izquierda -->
    <div class="flex items-center gap-6">
      <h1 routerLink="" class="font-bold text-lg cursor-pointer">
        Octágono Central
      </h1>

      <nav class="hidden md:flex gap-4 text-sm">
        <a routerLink="" class="hover:text-red-500">Inicio</a>
        <a routerLink="fighters" class="hover:text-red-500">Peleadores</a>
      </nav>
    </div>

    <!-- Derecha -->
    <div class="flex items-center gap-4">
      <input
        type="text"
        placeholder="Buscar..."
        (input)="buscar($any($event.target).value)"
        class="hidden md:block px-3 py-1 rounded bg-zinc-800 text-sm"
      />

      <button
        (click)="toggleEnlaces()"
        class="text-xl hover:text-red-500"
      >
        ...
      </button>
    </div>

  </div>
</header>

@if (mostrarEnlaces) {
  <div class="fixed top-16 right-6 w-56 bg-zinc-900 rounded-xl shadow-xl">
    <a href="https://www.ufc.com" target="_blank" class="block px-4 py-3 hover:bg-red-600">UFC</a>
    <a href="https://www.sherdog.com" target="_blank" class="block px-4 py-3 hover:bg-red-600">Sherdog</a>
    <a href="https://www.tapology.com" target="_blank" class="block px-4 py-3 hover:bg-red-600">Tapology</a>
    <a href="https://www.espn.com/mma/" target="_blank" class="block px-4 py-3 hover:bg-red-600">ESPN MMA</a>
  </div>
}

<main class="pt-24 px-6">
  <router-outlet />
</main>

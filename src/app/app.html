<header class="fixed top-0 left-0 w-full bg-black text-white z-50 shadow-lg">
  <div class="flex items-center justify-between px-6 py-4">

    <!-- Logo -->
    <h1 class="font-bold text-lg tracking-wide">
      Octágono Central
    </h1>

    <!-- Botón enlaces -->
    <button
      (click)="toggleEnlaces()"
      class="text-xl hover:text-red-500 transition"
      aria-label="Abrir enlaces"
    >
    ...
    </button>

  </div>
</header>

<!-- Panel flotante de enlaces -->
@if (mostrarEnlaces) {
  <div
    class="fixed top-16 right-6 w-56 bg-zinc-900 text-white rounded-xl shadow-xl border border-zinc-700 z-40"
  >
    <ul class="flex flex-col text-sm">

      <li>
        <a
          href="https://www.ufc.com"
          target="_blank"
          rel="noopener noreferrer"
          class="block px-4 py-3 hover:bg-red-600 rounded-t-xl transition"
        >
          UFC Oficial
        </a>
      </li>

      <li>
        <a
          href="https://www.sherdog.com"
          target="_blank"
          rel="noopener noreferrer"
          class="block px-4 py-3 hover:bg-red-600 transition"
        >
          Sherdog
        </a>
      </li>

      <li>
        <a
          href="https://www.tapology.com"
          target="_blank"
          rel="noopener noreferrer"
          class="block px-4 py-3 hover:bg-red-600 transition"
        >
          Tapology
        </a>
      </li>

      <li>
        <a
          href="https://www.espn.com/mma/"
          target="_blank"
          rel="noopener noreferrer"
          class="block px-4 py-3 hover:bg-red-600 rounded-b-xl transition"
        >
          ESPN MMA
        </a>
      </li>

    </ul>
  </div>
}

<!-- Contenido vacío por ahora -->
<main class="pt-20"></main>

<section class="max-w-7xl mx-auto text-white">

    <h2 class="text-3xl font-bold mb-6 text-red-500">
        Peleadores
    </h2>

    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">

        @for (f of filtrados(); track f.nombre) {
        <div
            class="bg-zinc-900 border border-zinc-800 rounded-xl p-6
                hover:border-red-500 transition"
        >
            <h3 class="text-xl font-bold">{{ f.nombre }}</h3>
            <p class="text-sm text-zinc-400">{{ f.categoria }}</p>
            <p class="mt-2 text-sm">
            Récord:
            <span class="text-red-500 font-semibold">{{ f.record }}</span>
            </p>
        </div>
        }

    </div>

</section>
